<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>QUOTEX SIGNAL GENERATOR • JUMMUU </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Unique futuristic styles - Mobile Optimized */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            background: radial-gradient(circle at 20% 30%, #1a1a1a, #000000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid - subtle */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .main-container {
            max-width: 500px;
            width: 100%;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            box-shadow:
                0 20px 40px -15px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 215, 0, 0.2) inset,
                0 0 30px rgba(255, 215, 0, 0.15);
            position: relative;
            z-index: 10;
        }

        /* Robot Logo Only - No Text */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.8rem;
            position: relative;
        }

        .robot-logo {
            width: 85px;
            height: 85px;
            background: linear-gradient(145deg, #000000, #1a1a1a);
            border: 3px solid #FFD700;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow:
                0 8px 0 #000,
                0 15px 25px rgba(255, 215, 0, 0.3);
            transform: rotate(45deg);
            animation: floatRobot 6s ease-in-out infinite;
        }

        .robot-logo::before {
            content: '';
            position: absolute;
            width: 115%;
            height: 115%;
            border: 2px solid rgba(255, 215, 0, 0.15);
            border-radius: 30px;
            animation: rotateBorder 8s linear infinite;
        }

        .robot-logo svg {
            transform: rotate(-45deg);
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 8px #FFD700);
        }

        @keyframes floatRobot {
            0% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(-8px); }
            100% { transform: rotate(45deg) translateY(0); }
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Status indicator */
        .api-status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding: 0.6rem 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .cyber-dot {
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            position: relative;
        }

        .cyber-dot::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #FFD700;
            border-radius: 50%;
            animation: cyberPulse 2s ease-out infinite;
            opacity: 0.5;
        }

        @keyframes cyberPulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .api-text {
            font-family: 'Orbitron', sans-serif;
            color: #FFD700;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
        }

        /* Select styling - Mobile optimized */
        .select-wrapper {
            position: relative;
            margin-bottom: 1.8rem;
        }

        .cyber-select {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #FFD700;
            border-radius: 50px;
            padding: 1rem 1.2rem;
            color: #FFD700;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            appearance: none;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #000, 0 0 15px rgba(255, 215, 0, 0.2);
            letter-spacing: 0.5px;
        }

        .cyber-select:hover {
            background: rgba(20, 20, 20, 0.9);
            box-shadow: 0 4px 0 #000, 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .cyber-select:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 4px 0 #000, 0 0 25px #FFD700;
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #FFD700;
            font-size: 0.9rem;
            pointer-events: none;
            text-shadow: 0 0 8px #FFD700;
        }

        /* Generate button */
        .cyber-button {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(145deg, #000000, #1a1a1a);
            border: 3px solid #FFD700;
            border-radius: 50px;
            color: #FFD700;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 6px 0 #000, 0 0 20px rgba(255, 215, 0, 0.3);
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .cyber-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            transition: left 0.5s;
        }

        .cyber-button:hover::before {
            left: 100%;
        }

        .cyber-button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #000, 0 0 25px #FFD700;
        }

        .cyber-button:disabled {
            opacity: 0.6;
            transform: translateY(3px);
            box-shadow: 0 3px 0 #000;
            cursor: not-allowed;
        }

        /* Signal card - Mobile optimized */
        .signal-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 1.8rem;
            padding: 1.5rem 1.2rem;
            position: relative;
            overflow: hidden;
        }

        .signal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 215, 0, 0.05),
                transparent
            );
            transform: rotate(45deg);
            animation: hologram 10s linear infinite;
        }

        @keyframes hologram {
            0% { transform: rotate(45deg) translateY(-100%); }
            100% { transform: rotate(45deg) translateY(100%); }
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            position: relative;
        }

        .signal-title {
            font-family: 'Orbitron', sans-serif;
            color: #FFD700;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .telegram-link {
            color: #FFD700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0.4rem 1rem;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.8rem;
        }

        /* Signal rows - Mobile optimized */
        .signal-row {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            margin: 0.4rem 0;
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #FFD700;
            border-radius: 12px;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .signal-icon {
            width: 30px;
            color: #FFD700;
            margin-right: 0.8rem;
            font-size: 1.1rem;
        }

        .signal-label {
            width: 85px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .signal-value {
            flex: 1;
            color: #FFD700;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }

        .direction-call {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .direction-put {
            color: #ff4d4d;
            text-shadow: 0 0 10px #ff4d4d;
        }

        /* Arrow positioning - Mobile */
        #signal-arrow {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        #signal-arrow svg {
            width: 45px;
            height: 45px;
        }

        /* Loading spinner - Mobile */
        .cyber-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            padding: 2rem 1rem;
        }

        .cyber-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top: 3px solid #FFD700;
            border-right: 3px solid #FFD700;
            border-radius: 50%;
            animation: cyberSpin 1s linear infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        @keyframes cyberSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            color: #FFD700;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 3px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Error message */
        .error-message {
            background: rgba(255, 0, 0, 0.15);
            border: 2px solid #ff4d4d;
            border-radius: 50px;
            padding: 1rem;
            color: white;
            text-align: center;
            margin-top: 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        /* Hide elements */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="main-container">

    <div class="logo-container">
        <div class="robot-logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="#FFD700"/>
                <circle cx="9" cy="10" r="2" fill="#FFD700"/>
                <circle cx="15" cy="10" r="2" fill="#FFD700"/>
                <path d="M12 14c-1.5 0-2.8.8-3.5 2h7c-.7-1.2-2-2-3.5-2z" fill="#FFD700"/>
                <rect x="10" y="16" width="4" height="1" fill="#FFD700"/>
            </svg>
        </div>
    </div>


    <div class="api-status-container">
        <div class="cyber-dot" id="api-status"></div>
        <span class="api-text" id="api-status-text">API READY</span>
    </div>


    <div class="select-wrapper">
        <select id="pair-select" class="cyber-select">
            <optgroup label="FOREX OTC PAIRS" style="color: #FFD700; background: #000;">
                <option value="USDBDT_otc">USD/BDT (OTC)</option>
                <option value="USDBRL_otc">BRL/USD (OTC)</option>
                <option value="USDPKR_otc">USD/PKR (OTC)</option>
                <option value="USDINR_otc">USD/INR (OTC)</option>
                <option value="USDARS_otc">USD/ARS (OTC)</option>
                <option value="USDPHP_otc">USD/PHP (OTC)</option>
                <option value="USDMXN_otc">USD/MXN (OTC)</option>
                <option value="USDCOP_otc">USD/COP (OTC)</option>
                <option value="USDEGP_otc">USD/EGP (OTC)</option>
                <option value="USDTRY_otc">USD/TRY (OTC)</option>
                <option value="USDDZD_otc">USD/DZD (OTC)</option>
                <option value="USDIDR_otc">USD/IDR (OTC)</option>
                <option value="USDZAR_otc">USD/ZAR (OTC)</option>
                <option value="USDNGN_otc">USD/NGN (OTC)</option>
            </optgroup>
        </select>
    </div>


    <button id="generate-button" class="cyber-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h8l-2 8 10-12h-8l2-8z"/>
        </svg>
        GENERATE SIGNAL
    </button>


    <div id="loading-indicator" class="cyber-loader hidden">
        <div class="cyber-spinner"></div>
        <div class="loader-text">ANALYZING MARKET</div>
    </div>


    <div id="signal-output" class="signal-card hidden">
        <div class="signal-header">
            <span class="signal-title">⚡ SIGNAL READY</span>
            <a href="https://t.me/jummuubot" target="_blank" class="telegram-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.06-.2s-.18-.04-.26-.02c-.11.02-1.89 1.2-5.33 3.52-.5.35-.96.52-1.37.51-.45-.01-1.32-.26-1.97-.47-.79-.26-1.42-.4-1.37-.85.03-.23.35-.47.96-.71 3.74-1.63 6.24-2.7 7.5-3.22 3.57-1.47 4.31-1.73 4.8-1.74.11 0 .35.02.51.13.13.09.17.21.18.3-.02.06-.03.17-.05.28z"/>
                </svg>
                @jummuubot
            </a>
        </div>

        <div class="space-y-2" id="signal-content">

        </div>

        <div id="signal-arrow"></div>
    </div>


    <div id="error-message" class="error-message hidden"></div>
</div>

<script>
    // DOM Elements
    const generateButton = document.getElementById('generate-button');
    const pairSelect = document.getElementById('pair-select');
    const signalOutput = document.getElementById('signal-output');
    const signalContent = document.getElementById('signal-content');
    const loadingIndicator = document.getElementById('loading-indicator');
    const errorMessage = document.getElementById('error-message');
    const apiStatus = document.getElementById('api-status');
    const apiStatusText = document.getElementById('api-status-text');
    const signalArrow = document.getElementById('signal-arrow');


    const updateApiStatus = (status, text) => {
        apiStatus.className = 'cyber-dot ' + status;
        apiStatusText.textContent = `API ${text}`;
    };


    const showError = (message) => {
        errorMessage.textContent = message;
        errorMessage.classList.remove('hidden');
        signalOutput.classList.add('hidden');
    };


    const hideError = () => {
        errorMessage.classList.add('hidden');
    };


    const updateSignalUI = (signalData) => {
        const directionClass = signalData.direction === 'CALL' ? 'direction-call' : 'direction-put';
        const directionIcon = signalData.direction === 'CALL' ? '↑' : '↓';

        signalContent.innerHTML = `
            <div class="signal-row">
                <div class="signal-icon">📊</div>
                <div class="signal-label">PAIR</div>
                <div class="signal-value">${signalData.pair}</div>
            </div>
            <div class="signal-row">
                <div class="signal-icon">⏰</div>
                <div class="signal-label">TIME</div>
                <div class="signal-value">${signalData.time || '--:--'}</div>
            </div>
            <div class="signal-row">
                <div class="signal-icon">🎯</div>
                <div class="signal-label">DIRECTION</div>
                <div class="signal-value ${directionClass}">${directionIcon} ${signalData.direction}</div>
            </div>
            <div class="signal-row">
                <div class="signal-icon">⏳</div>
                <div class="signal-label">DURATION</div>
                <div class="signal-value">${signalData.duration || 'M1'}</div>
            </div>
            <div class="signal-row">
                <div class="signal-icon">🛡️</div>
                <div class="signal-label">MARTINGALE</div>
                <div class="signal-value">${signalData.martingale || 'MG1'}</div>
            </div>
            <div class="signal-row">
                <div class="signal-icon">📈</div>
                <div class="signal-label">ACCURACY</div>
                <div class="signal-value">${signalData.accuracy || '--'}</div>
            </div>
        `;


        signalArrow.innerHTML = '';
        if (signalData.direction === 'CALL') {
            signalArrow.innerHTML = `<svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>`;
        } else {
            signalArrow.innerHTML = `<svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="2"><path d="M12 19V5M5 12l7 7 7-7"/></svg>`;
        }

        signalOutput.classList.remove('hidden');
        hideError();
    };


    generateButton.addEventListener('click', async () => {
        const selectedPair = pairSelect.value;

        if (!selectedPair) {
            showError('Please select a market pair');
            return;
        }


        generateButton.innerHTML = 'PROCESSING...';
        generateButton.disabled = true;
        loadingIndicator.classList.remove('hidden');
        signalOutput.classList.add('hidden');
        hideError();

        updateApiStatus('connecting', 'CONNECTING');

        try {
            // Call backend API (all hidden logic happens on server)
            const response = await fetch('/api/generate-signal', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ pair: selectedPair })
            });

            const data = await response.json();

            if (data.status === 'success') {
                updateSignalUI(data.signal);
                updateApiStatus('connected', 'ACTIVE');
            } else {
                throw new Error(data.message || 'Failed to generate signal');
            }

        } catch (error) {
            console.error('Signal Generation Error:', error);
            updateApiStatus('disconnected', 'ERROR');
            showError('Failed to fetch signal from API');
        } finally {
            generateButton.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h8l-2 8 10-12h-8l2-8z"/>
                </svg>
                GENERATE SIGNAL
            `;
            generateButton.disabled = false;
            loadingIndicator.classList.add('hidden');
        }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        updateApiStatus('connected', 'READY');
    });
</script>
</body>
</html>
